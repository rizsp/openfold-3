train:
  settings:
    blocks_per_ckpt: 1
    ckpt_intermediate_steps: true
  architecture:
    shared:
      use_confidence_emb_prob: 0.8
      diffusion:
        use_conditioning_prob: 0.8
    loss_module:
      diffusion:
        chunk_size: 4

predict:
  settings:
    memory:
      eval:
        # This chunk size is the minimum value, it will be auto-tuned by default
        chunk_size: 4
        offload_inference:
          confidence_heads: true
          token_cutoff: 2800

pae_enabled:
  architecture:
    heads:
      pae: 
        enabled: True

low_mem:
  settings:
    clear_cache_between_steps: True
    memory:
      eval:
        per_sample_token_cutoff: 0
        per_sample_atom_cutoff: 0
        offload_inference:
          msa_module: true
          confidence_heads: true
          token_cutoff: 0
